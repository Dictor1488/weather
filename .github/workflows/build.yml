name: Build and Release .wotmod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod Version'
        required: true
        default: '0.0.1'
      game_version:
        description: 'World of Tanks version'
        required: true
        default: '2.2.1.1'

permissions:
  contents: write

env:
  FLEX_VERSION: "4.16.1"
  FLASH_PLAYER_VERSION: "32.0"
  SWF_VERSION: "39"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python 2.7 via Chocolatey
      run: choco install python2 -y --no-progress

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Cache Flex SDK
      id: cache-flex
      uses: actions/cache@v4
      with:
        path: C:\flex-sdk
        key: flex-sdk-${{ env.FLEX_VERSION }}-v2

    - name: Download Flex SDK
      if: steps.cache-flex.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $urls = @(
          "https://archive.apache.org/dist/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip",
          "https://dlcdn.apache.org/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip"
        )
        $ok = $false
        foreach ($url in $urls) {
          try { Invoke-WebRequest -Uri $url -OutFile flex-sdk.zip -UseBasicParsing -TimeoutSec 300; $ok=$true; break }
          catch { Write-Host "Failed: $_" }
        }
        if (-not $ok) { Write-Error "Cannot download Flex SDK"; exit 1 }
        New-Item -ItemType Directory -Force C:\flex-sdk | Out-Null
        Expand-Archive flex-sdk.zip C:\flex-sdk-temp -Force
        $sub = Get-ChildItem C:\flex-sdk-temp
        if ($sub.Count -eq 1 -and $sub[0].PSIsContainer) {
          Get-ChildItem $sub[0].FullName | Move-Item -Destination C:\flex-sdk -Force
        } else {
          Get-ChildItem C:\flex-sdk-temp | Move-Item -Destination C:\flex-sdk -Force
        }

    - name: Setup playerglobal.swc
      shell: pwsh
      run: |
        $src = "as3\libs\playerglobal.swc"
        if (-not (Test-Path $src)) { Write-Error "playerglobal.swc not found"; exit 1 }
        $dir32 = "C:\flex-sdk\frameworks\libs\player\32.0"
        New-Item -ItemType Directory -Force $dir32 | Out-Null
        Copy-Item $src "$dir32\playerglobal.swc" -Force
        Copy-Item $src "C:\flex-sdk\frameworks\libs\player\playerglobal.swc" -Force
        $minCfg = '<?xml version="1.0" encoding="utf-8"?><flex-config><compiler><external-library-path append="true"><path-element>C:/flex-sdk/frameworks/libs/player/32.0/playerglobal.swc</path-element></external-library-path></compiler><target-player>32.0</target-player><swf-version>39</swf-version></flex-config>'
        Set-Content "C:\flex-sdk\frameworks\flex-config.xml" $minCfg -Encoding UTF8
        Write-Host "flex-config.xml replaced"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil

    - name: Determine Version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $v  = "${{ inputs.version }}"
          $gv = "${{ inputs.game_version }}"
        } else {
          $v  = "${{ github.ref_name }}".TrimStart('v')
          $gv = "2.2.1.1"
        }
        "PROJECT_VERSION=$v" >> $env:GITHUB_ENV
        "GAME_VERSION=$gv"   >> $env:GITHUB_ENV

    - name: Build SWF files
      shell: pwsh
      run: |
        $env:Path = "C:\flex-sdk\bin;$env:Path"
        $mxmlcPath = "C:\flex-sdk\bin\mxmlc.bat"
        if (-not (Test-Path $mxmlcPath)) { Write-Error "mxmlc not found"; exit 1 }
        New-Item -ItemType Directory -Force as3\bin | Out-Null

        $libArgs = @()
        Get-ChildItem as3\libs -Filter *.swc -Recurse | ForEach-Object {
          $libArgs += "-external-library-path+=$($_.FullName)"
        }

        $projects = Get-ChildItem as3\src_flash -Filter *.as3proj -Recurse
        foreach ($proj in $projects) {
          $projDir = $proj.DirectoryName
          Write-Host "Project: $($proj.FullName)"
          [xml]$xml = Get-Content $proj.FullName

          $swfName = $null
          $xml.project.o | ForEach-Object {
            $_.movie | ForEach-Object {
              if ($_.path -and $_.path -ne "") { $swfName = $_.path }
            }
          }
          if (-not $swfName) { $swfName = "WeatherPanel.swf" }
          Write-Host "Output SWF: $swfName"

          $mainAs = $null
          $xml.project.compileTargets.compile | ForEach-Object {
            if ($_.path) { $mainAs = Join-Path $projDir $_.path }
          }
          if (-not $mainAs -or -not (Test-Path $mainAs)) {
            Write-Error "Entry point not found: $mainAs"; exit 1
          }
          Write-Host "Entry point: $mainAs"

          $srcArgs = @()
          $xml.project.classpaths.class | ForEach-Object {
            if ($_.path) {
              $srcDir = (Resolve-Path (Join-Path $projDir $_.path)).Path
              $srcArgs += "-source-path+=$srcDir"
              Write-Host "Source path: $srcDir"
            }
          }

          Write-Host "=== AS3 files ==="
          $srcArgs | ForEach-Object {
            $sp = $_ -replace "-source-path\+=",""
            Get-ChildItem -Recurse $sp -Filter *.as -EA SilentlyContinue | ForEach-Object {
              Write-Host "  $($_.FullName)"
            }
          }
          Write-Host "================="

          $outSwf = Join-Path as3\bin $swfName
          $args = $srcArgs + $libArgs + @(
            "-output=$outSwf",
            "-target-player=${{ env.FLASH_PLAYER_VERSION }}",
            "-swf-version=${{ env.SWF_VERSION }}",
            "-strict=true",
            "-optimize=true",
            $mainAs
          )

          Write-Host "Running: mxmlc $($args -join ' ')"
          # -- передається самому PowerShell а не mxmlc, тому прибираємо його
          # передаємо точку входу просто останнім аргументом
          & $mxmlcPath @args
          $exitCode = $LASTEXITCODE
          Write-Host "mxmlc exit: $exitCode"

          if ($exitCode -ne 0) { Write-Error "mxmlc failed (exit $exitCode)"; exit 1 }
          if (-not (Test-Path $outSwf)) { Write-Error "SWF not created"; exit 1 }

          $sz = (Get-Item $outSwf).Length
          Write-Host "SWF: $([math]::Round($sz/1KB,2)) KB"
          if ($sz -lt 10240) { Write-Error "SWF too small ($sz bytes)"; exit 1 }
          Write-Host "SUCCESS: $swfName" -ForegroundColor Green
        }

    - name: Create build.json
      shell: pwsh
      run: |
        @{
          version = 5
          software = @{ animate = " "; python = "C:/Python27/python.exe" }
          game = @{ force = $false; folder = "World_of_Tanks_EU"; version = "${{ env.GAME_VERSION }}" }
          info = @{ id = "com.example.weather"; name = "Weather Mod"; description = "Weather preset randomizer"; version = "${{ env.PROJECT_VERSION }}" }
        } | ConvertTo-Json -Depth 4 | Out-File build.json -Encoding UTF8

    - name: Run Build Script
      run: python build.py --distribute

    - name: Upload to Release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: "v${{ env.PROJECT_VERSION }}"
        commit: ${{ github.sha }}
        artifacts: "build/*.wotmod,build/*.zip"
        allowUpdates: true
        removeArtifacts: true
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
