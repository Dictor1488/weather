name: Build and Release .wotmod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod Version'
        required: true
        default: '0.0.1'
      game_version:
        description: 'World of Tanks version'
        required: true
        default: '2.2.1.1'

permissions:
  contents: write

env:
  FLEX_VERSION: "4.16.1"
  FLASH_PLAYER_VERSION: "32.0"
  SWF_VERSION: "39"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python 2.7 via Chocolatey
      run: choco install python2 -y --no-progress

    - name: Install Java (required for Flex SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Cache Flex SDK
      id: cache-flex
      uses: actions/cache@v4
      with:
        path: C:\flex-sdk
        key: flex-sdk-${{ env.FLEX_VERSION }}-v3

    - name: Download and Setup Apache Flex SDK
      if: steps.cache-flex.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $flexUrls = @(
            "https://archive.apache.org/dist/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip",
            "https://dlcdn.apache.org/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip"
        )
        $downloaded = $false
        foreach ($url in $flexUrls) {
            try {
                Invoke-WebRequest -Uri $url -OutFile "flex-sdk.zip" -UseBasicParsing -TimeoutSec 300
                $downloaded = $true
                break
            } catch { Write-Host "Failed: $_" }
        }
        if (-not $downloaded) { Write-Error "Could not download Flex SDK"; exit 1 }
        New-Item -ItemType Directory -Force -Path "C:\flex-sdk"
        Expand-Archive -Path "flex-sdk.zip" -DestinationPath "C:\flex-sdk-temp" -Force
        $extractedItems = Get-ChildItem "C:\flex-sdk-temp"
        if ($extractedItems.Count -eq 1 -and $extractedItems[0].PSIsContainer) {
            Get-ChildItem "$($extractedItems[0].FullName)" | Move-Item -Destination "C:\flex-sdk" -Force
        } else {
            Get-ChildItem "C:\flex-sdk-temp" | Move-Item -Destination "C:\flex-sdk" -Force
        }
        Remove-Item "flex-sdk.zip" -Force -ErrorAction SilentlyContinue
        Remove-Item "C:\flex-sdk-temp" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Setup playerglobal.swc
      shell: pwsh
      run: |
        $libsPlayerGlobal = "as3\libs\playerglobal.swc"
        if (-not (Test-Path $libsPlayerGlobal)) { Write-Error "playerglobal.swc not found"; exit 1 }
        $vDir = "C:\flex-sdk\frameworks\libs\player\32.0"
        New-Item -ItemType Directory -Force -Path $vDir | Out-Null
        Copy-Item $libsPlayerGlobal "$vDir\playerglobal.swc" -Force
        Copy-Item $libsPlayerGlobal "C:\flex-sdk\frameworks\libs\player\playerglobal.swc" -Force
        $cfg = "C:\flex-sdk\frameworks\flex-config.xml"
        if (Test-Path $cfg) {
            $txt = [System.IO.File]::ReadAllText($cfg)
            $txt = $txt.Replace('{playerglobalHome}', 'C:/flex-sdk/frameworks/libs/player')
            $txt = [System.Text.RegularExpressions.Regex]::Replace($txt, '<local-fonts-snapshot[^/]*/>', '')
            $txt = [System.Text.RegularExpressions.Regex]::Replace($txt, '(?s)<local-fonts-snapshot[^>]*>.*?</local-fonts-snapshot>', '')
            [System.IO.File]::WriteAllText($cfg, $txt)
            Write-Host "flex-config.xml patched OK"
        }

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil

    - name: Determine Version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v  = "${{ inputs.version }}"
            $gv = "${{ inputs.game_version }}"
        } else {
            $v  = "${{ github.ref_name }}".TrimStart('v')
            $gv = "2.2.1.1"
        }
        "PROJECT_VERSION=$v" >> $env:GITHUB_ENV
        "GAME_VERSION=$gv"   >> $env:GITHUB_ENV

    - name: Build SWF files
      shell: pwsh
      run: |
        $srcDir  = (Resolve-Path "as3\src_flash").Path
        $swcPath = (Resolve-Path "as3\libs\playerglobal.swc").Path
        $mainAs  = (Resolve-Path "as3\src_flash\weather\WeatherMediator.as").Path
        $outDir  = "$PWD\as3\bin"
        $outSwf  = "$outDir\WeatherPanel.swf"
        $flexCfg = "C:\flex-sdk\frameworks\flex-config.xml"
        $jar     = "C:\flex-sdk\lib\mxmlc.jar"

        New-Item -ItemType Directory -Force $outDir | Out-Null
        Remove-Item "$outDir\*.swf" -Force -EA SilentlyContinue

        Write-Host "source-path : $srcDir"
        Write-Host "playerglobal: $swcPath"
        Write-Host "entry point : $mainAs"

        if (-not (Test-Path $jar)) { Write-Error "mxmlc.jar not found"; exit 1 }

        & java "-jar" $jar "-load-config=$flexCfg" "-source-path+=$srcDir" "-library-path+=$swcPath" "-output=$outSwf" "-target-player=${{ env.FLASH_PLAYER_VERSION }}" "-swf-version=${{ env.SWF_VERSION }}" "-strict=true" "-optimize=true" "--" $mainAs
        $exitCode = $LASTEXITCODE
        Write-Host "Exit code: $exitCode"
        if ($exitCode -ne 0) { Write-Error "Compilation failed"; exit 1 }

        if (-not (Test-Path $outSwf)) { Write-Error "SWF not created"; exit 1 }
        $sz = (Get-Item $outSwf).Length
        Write-Host "SWF size: $([math]::Round($sz/1KB,2)) KB"
        if ($sz -lt 10240) { Write-Error "SWF too small ($sz bytes)"; exit 1 }
        Write-Host "SUCCESS!" -ForegroundColor Green

    - name: Create build.json
      shell: pwsh
      run: |
        @{
            version = 5
            software = @{ animate = " "; python = "C:/Python27/python.exe" }
            game = @{ force = $false; folder = "World_of_Tanks_EU"; version = "${{ env.GAME_VERSION }}" }
            info = @{ id = "com.example.weather"; name = "Weather Mod"; description = "Weather preset randomizer"; version = "${{ env.PROJECT_VERSION }}" }
        } | ConvertTo-Json -Depth 4 | Out-File -FilePath build.json -Encoding UTF8

    - name: Run Build Script
      run: python build.py --distribute

    - name: Upload to Release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: "v${{ env.PROJECT_VERSION }}"
        commit: ${{ github.sha }}
        artifacts: "build/*.wotmod,build/*.zip"
        allowUpdates: true
        removeArtifacts: true
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
