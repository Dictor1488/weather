name: Build and Release .wotmod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod Version'
        required: true
        default: '0.0.1'
      game_version:
        description: 'World of Tanks version'
        required: true
        default: '2.2.1.1'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python 2.7 via Chocolatey
      run: choco install python2 -y --no-progress

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil

    - name: Cache Flex SDK
      id: cache-flex
      uses: actions/cache@v4
      with:
        path: C:\flex-sdk
        key: flex-sdk-4.16.1-v2

    - name: Download Flex SDK
      if: steps.cache-flex.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $urls = @(
          "https://archive.apache.org/dist/flex/4.16.1/binaries/apache-flex-sdk-4.16.1-bin.zip",
          "https://dlcdn.apache.org/flex/4.16.1/binaries/apache-flex-sdk-4.16.1-bin.zip"
        )
        $ok = $false
        foreach ($url in $urls) {
          try { Invoke-WebRequest -Uri $url -OutFile flex.zip -UseBasicParsing -TimeoutSec 300; $ok=$true; break }
          catch { Write-Host "Failed: $_" }
        }
        if (-not $ok) { exit 1 }
        New-Item -Force -ItemType Directory C:\flex-sdk | Out-Null
        Expand-Archive flex.zip C:\flex-sdk-tmp -Force
        $sub = Get-ChildItem C:\flex-sdk-tmp
        if ($sub.Count -eq 1 -and $sub[0].PSIsContainer) {
          Get-ChildItem $sub[0].FullName | Move-Item -Destination C:\flex-sdk -Force
        } else {
          Get-ChildItem C:\flex-sdk-tmp | Move-Item -Destination C:\flex-sdk -Force
        }

    - name: Setup playerglobal.swc
      shell: pwsh
      run: |
        $src = "as3\libs\playerglobal.swc"
        if (-not (Test-Path $src)) { Write-Error "playerglobal.swc not found"; exit 1 }
        $vDir = "C:\flex-sdk\frameworks\libs\player\32.0"
        New-Item -Force -ItemType Directory $vDir | Out-Null
        Copy-Item $src "$vDir\playerglobal.swc" -Force
        Copy-Item $src "C:\flex-sdk\frameworks\libs\player\playerglobal.swc" -Force
        $cfg = "C:\flex-sdk\frameworks\flex-config.xml"
        if (Test-Path $cfg) {
          (Get-Content $cfg -Raw) -replace '\{playerglobalHome\}','C:/flex-sdk/frameworks/libs/player' |
            Set-Content $cfg -Encoding UTF8
        }

    - name: Determine Version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $v = "${{ inputs.version }}"
          $gv = "${{ inputs.game_version }}"
        } else {
          $v  = "${{ github.ref_name }}".TrimStart('v')
          $gv = "2.2.1.1"
        }
        "PROJECT_VERSION=$v"  >> $env:GITHUB_ENV
        "GAME_VERSION=$gv"    >> $env:GITHUB_ENV

    - name: Compile SWF
      shell: pwsh
      run: |
        $env:Path = "C:\flex-sdk\bin;$env:Path"
        New-Item -Force -ItemType Directory as3\bin | Out-Null

        # Перевіряємо що mxmlc існує
        $mxmlc = "C:\flex-sdk\bin\mxmlc.bat"
        if (-not (Test-Path $mxmlc)) { Write-Error "mxmlc.bat not found at $mxmlc"; exit 1 }
        Write-Host "mxmlc found: $mxmlc"

        # Абсолютні шляхи
        $srcPath = (Resolve-Path "as3\src_flash").Path
        $swcPath = (Resolve-Path "as3\libs\playerglobal.swc").Path
        $mainAs  = (Resolve-Path "as3\src_flash\weather\WeatherMediator.as").Path
        $outSwf  = "$PWD\as3\bin\WeatherPanel.swf"

        Write-Host "source-path : $srcPath"
        Write-Host "playerglobal: $swcPath ($([math]::Round((Get-Item $swcPath).Length/1KB,1)) KB)"
        Write-Host "entry point : $mainAs"
        Write-Host "output      : $outSwf"

        # Запускаємо mxmlc напряму (& оператор — живий stdout у логах)
        & $mxmlc `
          "-source-path+=$srcPath" `
          "-external-library-path+=$swcPath" `
          "-output=$outSwf" `
          "-target-player=32.0" `
          "-swf-version=39" `
          "-strict=true" `
          "-optimize=true" `
          -- `
          "$mainAs"

        $exitCode = $LASTEXITCODE
        Write-Host "mxmlc exit code: $exitCode"
        if ($exitCode -ne 0) { Write-Error "mxmlc failed"; exit 1 }

        # Перевіряємо що SWF не порожній
        if (-not (Test-Path $outSwf)) { Write-Error "SWF not created"; exit 1 }
        $swfSize = (Get-Item $outSwf).Length
        Write-Host "SWF size: $([math]::Round($swfSize/1KB,2)) KB"
        if ($swfSize -lt 10240) {
          Write-Error "SWF too small ($swfSize bytes) — compilation likely failed"
          exit 1
        }
        Write-Host "SWF compiled successfully!" -ForegroundColor Green

    - name: Create build.json
      shell: pwsh
      run: |
        @{
          version=5
          software=@{animate=" ";python="C:/Python27/python.exe"}
          game=@{force=$false;folder="World_of_Tanks_EU";version="${{ env.GAME_VERSION }}"}
          info=@{id="com.example.weather";name="Weather Mod";description="Weather preset randomizer";version="${{ env.PROJECT_VERSION }}"}
        } | ConvertTo-Json -Depth 4 | Out-File build.json -Encoding UTF8

    - name: Run Build Script
      run: python build.py --distribute

    - name: Upload to Release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: "v${{ env.PROJECT_VERSION }}"
        commit: ${{ github.sha }}
        artifacts: "build/*.wotmod,build/*.zip"
        allowUpdates: true
        removeArtifacts: true
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
