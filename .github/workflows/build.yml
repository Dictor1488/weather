name: Build and Release .wotmod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod Version'
        required: true
        default: '0.0.1'
      game_version:
        description: 'World of Tanks version'
        required: true
        default: '2.2.1.1'

permissions:
  contents: write

env:
  FLEX_VERSION: "4.16.1"
  FLASH_PLAYER_VERSION: "11.4"
  SWF_VERSION: "17"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python 2.7 via Chocolatey
      run: choco install python2 -y --no-progress

    - name: Install Java (required for Flex SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Cache Flex SDK
      id: cache-flex
      uses: actions/cache@v4
      with:
        path: C:\flex-sdk
        key: flex-sdk-${{ env.FLEX_VERSION }}-v4

    - name: Download and Setup Apache Flex SDK
      if: steps.cache-flex.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $flexUrls = @(
            "https://archive.apache.org/dist/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip",
            "https://dlcdn.apache.org/flex/${{ env.FLEX_VERSION }}/binaries/apache-flex-sdk-${{ env.FLEX_VERSION }}-bin.zip"
        )
        $downloaded = $false
        foreach ($url in $flexUrls) {
            try {
                Invoke-WebRequest -Uri $url -OutFile "flex-sdk.zip" -UseBasicParsing -TimeoutSec 300
                $downloaded = $true
                break
            } catch { Write-Host "Failed: $_" }
        }
        if (-not $downloaded) { Write-Error "Could not download Flex SDK"; exit 1 }
        New-Item -ItemType Directory -Force -Path "C:\flex-sdk"
        Expand-Archive -Path "flex-sdk.zip" -DestinationPath "C:\flex-sdk-temp" -Force
        $extractedItems = Get-ChildItem "C:\flex-sdk-temp"
        if ($extractedItems.Count -eq 1 -and $extractedItems[0].PSIsContainer) {
            Get-ChildItem "$($extractedItems[0].FullName)" | Move-Item -Destination "C:\flex-sdk" -Force
        } else {
            Get-ChildItem "C:\flex-sdk-temp" | Move-Item -Destination "C:\flex-sdk" -Force
        }
        Remove-Item "flex-sdk.zip" -Force -ErrorAction SilentlyContinue
        Remove-Item "C:\flex-sdk-temp" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Setup playerglobal.swc
      shell: pwsh
      run: |
        $libsPlayerGlobal = "as3\libs\playerglobal.swc"
        if (-not (Test-Path $libsPlayerGlobal)) { Write-Error "playerglobal.swc not found"; exit 1 }
        $vDir = "C:\flex-sdk\frameworks\libs\player\32.0"
        New-Item -ItemType Directory -Force -Path $vDir | Out-Null
        Copy-Item $libsPlayerGlobal "$vDir\playerglobal.swc" -Force
        Copy-Item $libsPlayerGlobal "C:\flex-sdk\frameworks\libs\player\playerglobal.swc" -Force
        $flexConfig = "C:\flex-sdk\frameworks\flex-config.xml"
        if (Test-Path $flexConfig) {
            $content = Get-Content $flexConfig -Raw
            $content = $content -replace '\{playerglobalHome\}', 'C:/flex-sdk/frameworks/libs/player'
            $content | Set-Content $flexConfig -Encoding UTF8
        }

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil

    - name: Determine Version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v  = "${{ inputs.version }}"
            $gv = "${{ inputs.game_version }}"
        } else {
            $v  = "${{ github.ref_name }}".TrimStart('v')
            $gv = "2.2.1.1"
        }
        "PROJECT_VERSION=$v" >> $env:GITHUB_ENV
        "GAME_VERSION=$gv"   >> $env:GITHUB_ENV

    - name: Build SWF files
      shell: pwsh
      run: |
        $env:Path = "C:\flex-sdk\bin;$env:Path"
        $mxmlcPath = "C:\flex-sdk\bin\mxmlc.bat"
        if (-not (Test-Path $mxmlcPath)) { Write-Error "mxmlc not found"; exit 1 }
        $outputPath = "as3/bin"
        New-Item -ItemType Directory -Force -Path $outputPath | Out-Null
        $libArgs = @()
        Get-ChildItem -Path "as3/libs" -Filter "*.swc" -Recurse | ForEach-Object {
            if ($_.Name -eq "playerglobal.swc") {
                $libArgs += "-library-path+=$($_.FullName)"
            } else {
                $libArgs += "-external-library-path+=$($_.FullName)"
            }
        }
        $projects = Get-ChildItem -Path "as3/src_flash" -Filter "*.as3proj" -Recurse
        foreach ($proj in $projects) {
            $projDir = $proj.DirectoryName
            [xml]$projXml = Get-Content $proj.FullName
            $swfName = ($projXml.project.o.movie | Where-Object { $_.path -and $_.path -ne "" } | Select-Object -First 1).path
            if (-not $swfName) { $swfName = "WeatherPanel.swf" }
            $mainClassPath = $null
            $projXml.project.compileTargets.compile | ForEach-Object {
                if ($_.path) { $mainClassPath = Join-Path $projDir $_.path }
            }
            if (-not $mainClassPath -or -not (Test-Path $mainClassPath)) { Write-Warning "Main class not found: $mainClassPath"; continue }
            $outputSwf = Join-Path $outputPath $swfName
            $srcDir = Join-Path $projDir "src"

            # Будуємо командний рядок як рядок — Start-Process з масивом
            # некоректно передає аргументи з пробілами та спецсимволами
            $cmdParts = @("& `"$mxmlcPath`"")
            if (Test-Path $srcDir) { $cmdParts += "-source-path+=`"$srcDir`"" }
            foreach ($lib in $libArgs) { $cmdParts += "`"$lib`"" }
            $cmdParts += "-output=`"$outputSwf`""
            $cmdParts += "-target-player=${{ env.FLASH_PLAYER_VERSION }}"
            $cmdParts += "-swf-version=${{ env.SWF_VERSION }}"
            $cmdParts += "-strict=true"
            $cmdParts += "-optimize=false"
            # НЕ додаємо "--" — він ламає парсинг у Start-Process
            $cmdParts += "`"$mainClassPath`""

            $cmdLine = $cmdParts -join " "
            Write-Host "source-path: $srcDir"
            Write-Host "entry point: $mainClassPath"
            Write-Host "mxmlc cmd: $cmdLine"

            $output = Invoke-Expression $cmdLine 2>&1
            $exitCode = $LASTEXITCODE
            $output | Write-Host
            if ($exitCode -ne 0) { Write-Error "Compilation failed (exit $exitCode)"; exit 1 }
            if (-not (Test-Path $outputSwf)) { Write-Error "SWF not created: $outputSwf"; exit 1 }
            $sz = (Get-Item $outputSwf).Length
            Write-Host "SUCCESS: $swfName ($([math]::Round($sz/1KB,2)) KB)" -ForegroundColor Green
        }
        $builtSwfs = Get-ChildItem -Path $outputPath -Filter "*.swf" -ErrorAction SilentlyContinue
        if (-not $builtSwfs -or $builtSwfs.Count -eq 0) { Write-Error "No SWF files were built"; exit 1 }

    - name: Create build.json
      shell: pwsh
      run: |
        @{
            version = 5
            software = @{ animate = " "; python = "C:/Python27/python.exe" }
            game = @{ force = $false; folder = "World_of_Tanks_EU"; version = "${{ env.GAME_VERSION }}" }
            info = @{ id = "com.example.weather"; name = "Weather Mod"; description = "Weather preset randomizer"; version = "${{ env.PROJECT_VERSION }}" }
        } | ConvertTo-Json -Depth 4 | Out-File -FilePath build.json -Encoding UTF8

    - name: Run Build Script
      run: python build.py --distribute

    - name: Upload to Release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: "v${{ env.PROJECT_VERSION }}"
        commit: ${{ github.sha }}
        artifacts: "build/*.wotmod,build/*.zip"
        allowUpdates: true
        removeArtifacts: true
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
