name: Build and Release .wotmod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod Version'
        required: true
        default: '0.0.1'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python 2.7 via Chocolatey
        run: choco install python2 -y --no-progress

      - name: Verify Python 2.7
        shell: pwsh
        run: |
          $py2 = "C:\Python27\python.exe"
          if (-not (Test-Path $py2)) { Write-Error "Python 2.7 not found"; exit 1 }
          & $py2 --version

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
              $version = "${{ inputs.version }}"
          } else {
              $version = "${{ github.ref_name }}".TrimStart('v')
          }
          echo "PROJECT_VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Building version: $version"

      - name: Build .wotmod
        shell: pwsh
        run: |
          & "C:\Python27\python.exe" build.py --version $env:PROJECT_VERSION

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: "v${{ env.PROJECT_VERSION }}"
          artifacts: "dist/*.wotmod"
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: weather-mod-${{ env.PROJECT_VERSION }}
          path: dist/*.wotmod
