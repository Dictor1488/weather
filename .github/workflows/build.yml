name: Build and Release .wotmod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod Version'
        required: true
        default: '0.0.1'
      game_version:
        description: 'World of Tanks version'
        required: true
        default: '2.2.1.1'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python 2.7 via Chocolatey
      run: |
        choco install python2 -y --no-progress

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil

    - name: Determine Version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version     = "${{ inputs.version }}"
            $gameVersion = "${{ inputs.game_version }}"
        } else {
            $version     = "${{ github.ref_name }}".TrimStart('v')
            $gameVersion = "2.2.1.1"
        }
        echo "PROJECT_VERSION=$version"     >> $env:GITHUB_ENV
        echo "GAME_VERSION=$gameVersion"    >> $env:GITHUB_ENV
        Write-Host "Version: $version  GameVersion: $gameVersion"

    - name: Create build.json
      shell: pwsh
      run: |
        $json = @{
            version  = 5
            software = @{
                animate = " "
                python  = "C:/Python27/python.exe"
            }
            game = @{
                force   = $false
                folder  = "World_of_Tanks_EU"
                version = "${{ env.GAME_VERSION }}"
            }
            info = @{
                id          = "com.example.weather"
                name        = "Weather Mod"
                description = "Configurable weather preset randomizer for maps"
                version     = "${{ env.PROJECT_VERSION }}"
            }
        } | ConvertTo-Json -Depth 4
        $json | Out-File -FilePath build.json -Encoding UTF8
        Write-Host "build.json:"
        Get-Content build.json

    - name: Run Build Script
      run: python build.py --distribute

    - name: List artifacts
      shell: pwsh
      run: |
        Write-Host "=== Build artifacts ==="
        Get-ChildItem -Path "build" -Recurse | ForEach-Object {
            $size = if ($_.PSIsContainer) { "[DIR]" } else { "$([math]::Round($_.Length/1KB, 2)) KB" }
            Write-Host "  $($_.FullName) - $size"
        }

    - name: Upload to Release
      uses: ncipollo/release-action@v1.14.0
      with:
        tag: "v${{ env.PROJECT_VERSION }}"
        commit: ${{ github.sha }}
        artifacts: "build/*.wotmod,build/*.zip"
        allowUpdates: true
        removeArtifacts: true
        makeLatest: true
        token: ${{ secrets.GITHUB_TOKEN }}
